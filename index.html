<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>PhantomDial</title>
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --card:      #1a1a26;
    --border:    #2a2a3d;
    --accent:    #7c5cfc;
    --accent2:   #c05cfc;
    --green:     #2ecc71;
    --red:       #e74c3c;
    --amber:     #f39c12;
    --text:      #e8e8f0;
    --muted:     #6b6b88;
    --radius:    12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .live-badge {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.75rem; color: var(--muted);
  }
  .pulse {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Login gate ── */
  #login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; padding: 2rem;
    gap: 1rem;
  }
  #login-screen h2 { font-size: 1.4rem; letter-spacing: -0.02em; }
  #login-screen p  { color: var(--muted); font-size: 0.9rem; text-align: center; }

  /* ── Main content ── */
  main { padding: 1rem; max-width: 480px; margin: 0 auto; }

  /* ── Section titles ── */
  .section-title {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin: 1.5rem 0 0.6rem;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 0.75rem;
  }
  .card-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .call-number { font-weight: 600; font-size: 1rem; }
  .call-meta   { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

  /* ── Status pill ── */
  .pill {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.25rem 0.6rem; border-radius: 999px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.03em;
  }
  .pill.active  { background: rgba(46,204,113,0.15); color: var(--green); }
  .pill.ringing { background: rgba(243,156,18,0.15);  color: var(--amber); }
  .pill.ended   { background: rgba(107,107,136,0.15); color: var(--muted); }
  .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

  /* ── Call action buttons ── */
  .call-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  .btn {
    flex: 1; padding: 0.6rem; border-radius: 8px; border: none;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 0.35rem;
  }
  .btn:active { opacity: 0.7; transform: scale(0.97); }
  .btn-listen { background: rgba(124,92,252,0.2); color: var(--accent); border: 1px solid rgba(124,92,252,0.4); }
  .btn-hangup { background: rgba(231,76,60,0.2);  color: var(--red);    border: 1px solid rgba(231,76,60,0.4); }

  /* ── Inputs & primary button ── */
  input[type="password"], input[type="text"], input[type="tel"] {
    width: 100%; padding: 0.75rem 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.95rem;
    outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%; padding: 0.8rem; border-radius: 8px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.8; }

  /* ── Config tags ── */
  .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.3rem 0.6rem;
    font-size: 0.78rem; color: var(--muted);
    font-family: monospace;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 2.5rem 1rem; color: var(--muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .empty p    { font-size: 0.9rem; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    padding: 0.6rem 1.2rem; border-radius: 999px;
    font-size: 0.85rem; pointer-events: none;
    opacity: 0; transition: opacity 0.25s;
    white-space: nowrap; max-width: 90vw;
  }
  #toast.show { opacity: 1; }

  /* ── Refresh button ── */
  .refresh-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    padding: 0.35rem 0.75rem; font-size: 0.8rem;
    cursor: pointer; float: right;
  }
  .refresh-btn:active { opacity: 0.6; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">👻</div>
    PhantomDial
  </div>
  <div class="live-badge" id="live-badge" style="display:none">
    <div class="pulse"></div> Live
  </div>
</header>

<!-- Login -->
<div id="login-screen">
  <div class="logo-icon" style="width:56px;height:56px;font-size:1.8rem;border-radius:16px">👻</div>
  <h2>PhantomDial</h2>
  <p>Enter your dashboard password to continue</p>
  <input type="password" id="pass-input" placeholder="Password" autocomplete="current-password">
  <button class="btn-primary" onclick="login()">Unlock Dashboard</button>
  <p id="login-err" style="color:var(--red);font-size:0.85rem;display:none">Incorrect password</p>
</div>

<!-- Dashboard (hidden until login) -->
<main id="dashboard" style="display:none">

  <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
    <span>Active Calls</span>
    <button class="refresh-btn" onclick="loadCalls()">↻ Refresh</button>
  </div>
  <div id="calls-list">
    <div class="empty">
      <div class="empty-icon">📵</div>
      <p>No active calls right now.</p>
    </div>
  </div>

  <div class="section-title">Your Ring Group</div>
  <div class="card">
    <div id="config-area">
      <div class="tag-list"><span class="tag">Loading…</span></div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
  let PASS = '';

  // ── Login ──────────────────────────────────────────────────────────────────
  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    PASS = document.getElementById('pass-input').value.trim();
    const res = await fetch('/api/calls', { headers: { 'x-dashboard-pass': PASS } });
    if (res.status === 401) {
      document.getElementById('login-err').style.display = 'block';
      return;
    }
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('live-badge').style.display = 'flex';
    loadCalls();
    loadConfig();
    setInterval(loadCalls, 5000);
  }

  // ── Load calls ─────────────────────────────────────────────────────────────
  async function loadCalls() {
    const res  = await fetch('/api/calls', { headers: { 'x-dashboard-pass': PASS } });
    const data = await res.json();
    const el   = document.getElementById('calls-list');

    const relevant = data.filter(c => c.status !== 'ended');

    if (relevant.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">📵</div><p>No active calls right now.</p></div>`;
      return;
    }

    el.innerHTML = relevant.map(call => {
      const statusClass = call.status === 'active' ? 'active' : 'ringing';
      const statusLabel = call.status === 'active' ? '● Live' : '● Ringing';
      const time = new Date(call.startTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      return `
        <div class="card">
          <div class="card-row">
            <div>
              <div class="call-number">${maskNumber(call.from)}</div>
              <div class="call-meta">Started ${time}</div>
            </div>
            <span class="pill ${statusClass}"><span class="dot"></span>${call.status === 'active' ? 'Live' : 'Ringing'}</span>
          </div>
          <div class="call-actions">
            <button class="btn btn-listen" onclick="listenIn('${call.conferenceName}')">
              👂 Listen In
            </button>
            <button class="btn btn-hangup" onclick="hangup('${call.conferenceName}')">
              📵 End Call
            </button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Load config ────────────────────────────────────────────────────────────
  async function loadConfig() {
    const res  = await fetch('/api/config', { headers: { 'x-dashboard-pass': PASS } });
    const cfg  = await res.json();
    const el   = document.getElementById('config-area');

    const tags = cfg.ringTargets.map(n =>
      `<span class="tag">${maskNumber(n)}</span>`
    ).join('');

    el.innerHTML = `
      <div style="margin-bottom:0.5rem;font-size:0.82rem;color:var(--muted)">
        Incoming number: <strong style="color:var(--text)">${cfg.twilioNumber}</strong>
      </div>
      <div style="font-size:0.82rem;color:var(--muted);margin-bottom:0.5rem">Ringing simultaneously:</div>
      <div class="tag-list">${tags || '<span class="tag">None configured</span>'}</div>
    `;
  }

  // ── Listen In ─────────────────────────────────────────────────────────────
  async function listenIn(confName) {
    showToast('📞 Calling your listen number…');
    const res = await fetch('/listen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-dashboard-pass': PASS },
      body: JSON.stringify({ conferenceName: confName }),
    });
    const data = await res.json();
    if (data.success) showToast('✅ Listen-in call on its way!');
    else showToast('❌ ' + data.error);
  }

  // ── Hang up ───────────────────────────────────────────────────────────────
  async function hangup(confName) {
    if (!confirm('End this call?')) return;
    showToast('Ending call…');
    const res = await fetch('/api/hangup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-dashboard-pass': PASS },
      body: JSON.stringify({ conferenceName: confName }),
    });
    const data = await res.json();
    if (data.success) { showToast('✅ Call ended.'); loadCalls(); }
    else showToast('❌ ' + data.error);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function maskNumber(num) {
    if (!num || num.length < 7) return num;
    return num.slice(0, -4).replace(/\d/g, '•') + num.slice(-4);
  }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
